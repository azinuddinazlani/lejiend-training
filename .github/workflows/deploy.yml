name: Deploy to server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -e
          missing=0
          if [ -z "${{ secrets.GH_CD }}" ]; then echo "Missing secret: GH_CD"; missing=1; else echo "GH_CD set"; fi
          if [ -z "${{ secrets.SSH_HOST }}" ]; then echo "Missing secret: SSH_HOST"; missing=1; else echo "SSH_HOST set"; fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then echo "Missing secret: SSH_USER"; missing=1; else echo "SSH_USER set"; fi
          if [ -z "${{ secrets.DEPLOY_DIR }}" ]; then echo "Missing secret: DEPLOY_DIR"; missing=1; else echo "DEPLOY_DIR set"; fi
          if [ "$missing" -eq 1 ]; then exit 1; fi

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GH_CD }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key

      - name: Sync files to server
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" --delete --exclude='.git' --exclude='node_modules' ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_DIR }}

      - name: Install and start on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ secrets.DEPLOY_DIR }} && cd ${{ secrets.DEPLOY_DIR }} && npm install --production && nohup npm start > nohup.out 2>&1 &"
